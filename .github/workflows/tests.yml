name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  npm-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run test suite
        run: npm test
