mcp_servers:
  paperclip:
    command: "node"
    args: ["/opt/paperclip/mcp-paperclip/server.mjs"]
    enabled: true
    timeout: 60
    connect_timeout: 30
    tools:
      resources: false
      prompts: false

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
